name: Cultivation
options:
  bundleIdPrefix: com.cultivation
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "17.0"
  defaultConfig: Debug
settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0"
    DEVELOPMENT_TEAM: 32XZRDTGK3
targets:
  Cultivation:
    type: application
    platform: iOS
    sources:
      - Cultivation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cultivation.app
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
        INFOPLIST_KEY_CFBundleDisplayName: "Cultivation"
  CultivationTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CultivationTests
    dependencies:
      - target: Cultivation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cultivation.app.tests
